{% extends "base.html" %}
{% block title %}Add Route - TrafficPlot{% endblock %}
{% block content %}
<h1>Add Route</h1>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

<form method="post" class="form">
    <div class="field">
        <label for="name">Route Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Home to Office" required>
    </div>
    <div class="field">
        <label for="origin">Origin</label>
        <input type="text" id="origin" name="origin" placeholder="e.g. 123 Main St, New York, NY" required>
    </div>
    <div class="field">
        <label for="destination">Destination</label>
        <input type="text" id="destination" name="destination" placeholder="e.g. 456 Broadway, New York, NY" required>
    </div>
    <button type="submit" class="btn">Add Route</button>
</form>
{% endblock %}
